notes: >-
  Zhipu / AutoGLM ships AutoClaw as a one-click local OpenClaw desktop app for
  macOS and Windows with preloaded skills, browser automation, and model
  hot-swap. Manual re-review of the official site confirms the product is
  served from the exact `autoclaws.org` host. Excluded broader `zhipuai.cn`,
  App Store search surfaces, and model-provider endpoints because they are
  shared vendor or downstream infrastructure. Reviewed host IOC is kept
  conservative and limited to the branded macOS desktop app path.
