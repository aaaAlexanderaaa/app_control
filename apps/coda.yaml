      checked_at: '2026-03-21'
    hostname_patterns:
    - pattern: coda.io
      match: suffix
      role: app_brand
    keyword_patterns:
    - pattern: coda.io
      match: substring
    - pattern: coda desktop
      match: substring
  host:
    status: reviewed
    provenance:
      url: https://coda.io/@coda/desktop
      evidence: Coda’s official desktop page shows the macOS package name Coda-0.5.2-universal.dmg and instructs users to drag the app to the Applications folder; retained host IOC is limited to the Coda desktop app name implied by that official installer flow.
      checked_at: '2026-03-21'
    paths:
    - /Applications/Coda.app
    process_names:
    - Coda
