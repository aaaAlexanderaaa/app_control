      checked_at: '2026-03-21'
    hostname_patterns:
    - pattern: smallpdf.com
      match: suffix
      role: app_brand
    - pattern: download.smallpdf.com
      match: exact
      role: file_download
    keyword_patterns:
    - pattern: smallpdf
      match: substring
    - pattern: smallpdf desktop
      match: substring
  host:
    status: reviewed
    provenance:
      url: https://smallpdf.com/desktop
      evidence: Smallpdf’s official install instructions tell users to open Smallpdf.dmg, drag the Smallpdf MacOS App icon to the applications folder, and launch the app from Applications; retained host IOC is limited to the Smallpdf desktop app name implied by that guidance.
      checked_at: '2026-03-21'
    paths:
    - /Applications/Smallpdf*.app
    process_names:
    - Smallpdf
