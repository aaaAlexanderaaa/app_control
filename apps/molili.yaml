id: molili
name: Molili
category: CLAW_FAMILY_APP
product_shape:
- macos
product_type:
- personal_agent
- remote_control
- automation
severity: critical
priority_score: 93
notes: >-
  Molili is a Chinese local-first desktop AI agent with macOS installers,
  remote computer control, scheduling, and app automation. DMG re-review now
  confirms the stable `Molili.app` bundle and `com.molili.ai` bundle ID, so
  host IOC keeps only direct package metadata. Excluded transient DMG
  filenames once bundle metadata was confirmed.
references:
- url: https://www.molili.com.cn/
  kind: official_site
  summary: Official Molili site establishes molili.com.cn as the first-party host and links the current macOS download artifacts.
  checked_at: '2026-03-24'
- url: https://molili.dangcdn.com/molili/updates/MoliliAI_aarch64.dmg
  kind: official_download_asset
  summary: Official Molili DMG expands to `Molili.app` and its Info.plist sets bundle ID `com.molili.ai`.
  checked_at: '2026-03-24'
iocs:
  network:
    status: reviewed
    provenance:
      url: https://www.molili.com.cn/
      evidence: >-
        Official Molili site and direct macOS DMG links establish
        `molili.com.cn` and `molili.dangcdn.com` as first-party distribution
        hosts.
      checked_at: '2026-03-24'
    hostname_patterns:
    - pattern: molili.com.cn
      match: suffix
      role: app_brand
    - pattern: molili.dangcdn.com
      match: exact
      role: file_download
    keyword_patterns:
    - pattern: molili
      match: substring
  host:
    status: reviewed
    provenance:
      url: https://molili.dangcdn.com/molili/updates/MoliliAI_aarch64.dmg
      evidence: >-
        The official Molili Apple Silicon DMG expands to `Molili.app`, and its
        Info.plist sets `CFBundleIdentifier=com.molili.ai` and
        `CFBundleExecutable=Molili`, so the reviewed host IOC keeps only those
        stable bundle artifacts.
      checked_at: '2026-03-24'
    paths:
    - /Applications/Molili.app
    - ~/Applications/Molili.app
    bundle_ids:
    - com.molili.ai
    process_names:
    - Molili
