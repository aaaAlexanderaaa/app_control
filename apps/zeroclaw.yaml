id: zeroclaw
name: ZeroClaw
category: CLAW_FAMILY_APP
product_shape:
- macos
product_type:
- personal_agent
- agent_runtime
- automation
severity: critical
priority_score: 95
notes: >-
  ZeroClaw positions itself as a local private AI assistant and its official
  repo explicitly warns against zeroclaw.org and zeroclaw.net impersonation;
  use zeroclawlabs.ai and zeroclawlabs.cn as the trusted brand domains.
  Reviewed IOC keeps first-party runtime indicators only.
references:
- url: https://github.com/zeroclaw-labs/zeroclaw
  kind: official_repo
  summary: Official ZeroClaw repository documents the local assistant runtime and macOS host artifacts.
  checked_at: '2026-03-22'
- url: https://zeroclawlabs.ai/
  kind: official_site
  summary: Official ZeroClaw site establishes zeroclawlabs.ai as a first-party brand domain.
  checked_at: '2026-03-22'
iocs:
  network:
    status: reviewed
    provenance:
      url: https://zeroclawlabs.ai/
      evidence: >-
        Official ZeroClaw web properties are served from `zeroclawlabs.ai` and
        `zeroclawlabs.cn`, which the project treats as trusted first-party
        brand domains.
      checked_at: '2026-03-22'
    hostname_patterns:
    - pattern: zeroclawlabs.ai
      match: suffix
      role: app_brand
    - pattern: zeroclawlabs.cn
      match: suffix
      role: app_brand
    keyword_patterns:
    - pattern: zeroclaw
      match: substring
    - pattern: zeroclaw-labs
      match: substring
  host:
    status: reviewed
    provenance:
      url: https://github.com/zeroclaw-labs/zeroclaw
      evidence: >-
        The official ZeroClaw repository documents the `zeroclaw` runtime and
        local `~/.zeroclaw` state plus shell-completion artifacts.
      checked_at: '2026-03-22'
    paths:
    - ~/.cargo/bin/zeroclaw
    - ~/.zeroclaw/
    - ~/.zfunc/_zeroclaw
    process_names:
    - zeroclaw
