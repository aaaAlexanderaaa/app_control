id: zeroclaw
name: ZeroClaw
category: CLAW_FAMILY_APP
product_shape:
- macos
product_type:
- personal_agent
- agent_runtime
- automation
severity: critical
priority_score: 95
notes: >-
  ZeroClaw positions itself as a local private AI assistant and its official
  repo explicitly warns against `zeroclaw.org` and `zeroclaw.net`
  impersonation; manual re-review of the upstream README and current web
  property confirms the trusted web surface is `zeroclawlabs.ai` and the exact
  `www.zeroclawlabs.ai` host, while `zeroclawlabs.cn` no longer presents
  ZeroClaw branding. Reviewed IOC keeps only those first-party runtime
  indicators. Excluded `zeroclawlabs.cn`, `github.com`, and package or
  distribution infrastructure because they no longer present consistent
  ZeroClaw ownership or are shared surfaces.
references:
- url: https://github.com/zeroclaw-labs/zeroclaw
  kind: official_repo
  summary: Official ZeroClaw repository documents the local assistant runtime and macOS host artifacts.
  checked_at: '2026-03-22'
- url: https://zeroclawlabs.ai/
  kind: official_site
  summary: Official ZeroClaw site establishes zeroclawlabs.ai as a first-party brand domain.
  checked_at: '2026-03-22'
iocs:
  network:
    status: reviewed
    provenance:
      url: https://zeroclawlabs.ai/
      evidence: >-
        The official ZeroClaw repository and current website identify
        `zeroclawlabs.ai` as the trusted web property, and current web
        resolution lands on the exact `www.zeroclawlabs.ai` host; the reviewed
        network IOC therefore keeps only those consistent first-party ZeroClaw
        surfaces.
      checked_at: '2026-03-22'
    hostname_patterns:
    - pattern: zeroclawlabs.ai
      match: exact
      role: app_brand
    - pattern: www.zeroclawlabs.ai
      match: exact
      role: app_brand
    keyword_patterns:
    - pattern: zeroclaw
      match: substring
    - pattern: zeroclaw-labs
      match: substring
  host:
    status: reviewed
    provenance:
      url: https://github.com/zeroclaw-labs/zeroclaw
      evidence: >-
        The official ZeroClaw repository documents the `zeroclaw` runtime and
        local `~/.zeroclaw` state plus shell-completion artifacts.
      checked_at: '2026-03-22'
    paths:
    - ~/.cargo/bin/zeroclaw
    - ~/.zeroclaw/
    - ~/.zfunc/_zeroclaw
    process_names:
    - zeroclaw
