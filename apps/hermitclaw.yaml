severity: critical
priority_score: 93
notes: >-
  Open-source autonomous research pet; upstream still lacks a dedicated
  service domain or installer package, so reviewed IOC stays on the exact
  HermitClaw keyword plus the generated `*_box` runtime artifacts documented
  by the upstream README, entrypoint, brain loop, and memory code. Deep source
  review found only the local `localhost:8000` UI and third-party provider
  endpoints rather than a HermitClaw-owned service domain. Excluded
  `github.com`, `raw.githubusercontent.com`, and `localhost:8000` as network
  IOCs because they are shared code-hosting or local-development surfaces
  rather than HermitClaw-owned service domains.
references:
- url: https://raw.githubusercontent.com/brendanhogan/hermitclaw/main/README.md
  kind: upstream_readme
  summary: Upstream README documents running hermitclaw/main.py, the repo-root config.yaml, and the generated {name}_box world directory with memory_stream.jsonl.
  checked_at: '2026-03-24'
- url: https://raw.githubusercontent.com/brendanhogan/hermitclaw/main/pyproject.toml
  kind: upstream_source
  summary: Project metadata defines the package name hermitclaw for the local autonomous research pet.
  checked_at: '2026-03-24'
- url: https://raw.githubusercontent.com/brendanhogan/hermitclaw/main/hermitclaw/main.py
  kind: upstream_source
  summary: Entrypoint discovers `*_box` directories, migrates legacy `environment/`, and starts the local HermitClaw web UI on localhost:8000.
  checked_at: '2026-03-24'
- url: https://raw.githubusercontent.com/brendanhogan/hermitclaw/main/hermitclaw/brain.py
  kind: upstream_source
  summary: Brain loop writes the repo-local `hermitclaw.log.jsonl` activity log and updates `projects.md` inside each crab box.
  checked_at: '2026-03-24'
- url: https://raw.githubusercontent.com/brendanhogan/hermitclaw/main/hermitclaw/memory.py
  kind: upstream_source
  summary: Memory implementation persists the append-only stream and related recall data inside the generated crab box.
  checked_at: '2026-03-24'
