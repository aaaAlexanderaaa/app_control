id: angelclaw
name: AngelClaw
category: CLAW_FAMILY_APP
product_shape:
- macos
product_type:
- personal_agent
- automation
severity: critical
priority_score: 93
notes: >-
  Angel Claw is an open-source multi-tenant agent OS published as the
  `angel-claw` package and CLI. Manual re-review of the upstream README,
  package metadata, deployment guide, and source-backed skill registry code
  found strong local host artifacts under `~/.angelclaw` and `/opt/angel-claw`,
  but no dedicated first-party service domain. The reviewed source only
  exposed shared OpenClaw or ClawHub and Brave endpoints, so the network IOC
  intentionally stays on the exact AngelClaw package and product keywords.
  Excluded `github.com`, `raw.githubusercontent.com`, `pypi.org`, `pepy.tech`,
  `clawhub.ai`, `auth.clawdhub.com`, and `api.search.brave.com` as network
  IOCs because they are shared code, package, registry, or downstream search
  infrastructure rather than AngelClaw-owned service domains.
references:
- url: https://raw.githubusercontent.com/Abdur-rahmaanJ/angel-claw/stable/README.md
  kind: upstream_readme
  summary: Upstream README documents `pip install angel-claw`, the `angel-claw` CLI, and persistent user data under `~/.angelclaw/users/{user_id}`.
  checked_at: '2026-03-24'
- url: https://raw.githubusercontent.com/Abdur-rahmaanJ/angel-claw/stable/pyproject.toml
  kind: upstream_source
  summary: Package metadata defines the canonical `angel-claw` distribution name and console script entry point.
  checked_at: '2026-03-24'
- url: https://raw.githubusercontent.com/Abdur-rahmaanJ/angel-claw/stable/docs/deployment.md
  kind: upstream_source
  summary: Deployment guide documents `/opt/angel-claw`, `angel-claw-web.service`, `angel-claw-worker.service`, and backups of `~/.angelclaw`.
  checked_at: '2026-03-24'
- url: https://raw.githubusercontent.com/Abdur-rahmaanJ/angel-claw/stable/src/angel_claw/skills/core.py
  kind: upstream_source
  summary: Source-backed skill registry code calls shared ClawHub and Brave endpoints rather than an AngelClaw-owned service domain.
  checked_at: '2026-03-24'
iocs:
