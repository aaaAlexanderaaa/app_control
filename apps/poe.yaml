      checked_at: '2026-03-21'
    hostname_patterns:
    - pattern: poe.com
      match: suffix
      role: app_brand
    - pattern: desktop-app.poecdn.net
      match: exact
      role: file_download
    keyword_patterns:
    - pattern: poe.com
      match: substring
  host:
    status: reviewed
    provenance:
      url: https://formulae.brew.sh/api/cask/poe.json
      evidence: Homebrew cask defines the Poe app bundle and Poe-specific shared-file-list, support, cache, ShipIt, HTTP storage, preference, and saved-state paths.
      checked_at: '2026-03-21'
    paths:
    - /Applications/Poe.app
    - ~/Library/Application Support/Poe
    - ~/Library/Application Support/poe-electron
    - ~/Library/Caches/com.quora.poe.electron
    - ~/Library/HTTPStorages/com.quora.poe.electron
    - ~/Library/Preferences/com.quora.poe.electron.plist
    - ~/Library/Saved Application State/com.quora.poe.electron.savedState
    - ~/Library/Application Support/com.apple.sharedfilelist/com.apple.LSSharedFileList.ApplicationRecentDocuments/com.quora.poe.electron.sfl*
