id: onedrive
name: OneDrive
category: CLOUD_STORAGE
product_shape:
- web
- macos
product_type:
- cloud_drive
- sync
severity: high
priority_score: 73
notes: Prefer OneDrive-specific consumer endpoints from Microsoft documentation; avoid broad microsoft.com and sharepoint.com provider domains for enterprise detection.
iocs:
  network:
    status: reviewed
    provenance:
      url: https://learn.microsoft.com/en-us/onedrive/required-urls-and-ports
      evidence: Microsoft documents required OneDrive domains including onedrive.com, onedrive.live.com, files.1drv.com, storage.live.com, and skydrive.live.com; Homebrew cask adds the macOS installer host oneclient.sfx.ms.
      checked_at: '2026-03-21'
    hostname_patterns:
    - pattern: onedrive.com
      match: suffix
      role: app_brand
    - pattern: onedrive.live.com
      match: suffix
      role: file_sync
    - pattern: files.1drv.com
      match: suffix
      role: file_transfer
    - pattern: storage.live.com
      match: suffix
      role: file_transfer
    - pattern: skydrive.live.com
      match: exact
      role: file_transfer
    - pattern: oneclient.sfx.ms
      match: exact
      role: file_download
    keyword_patterns:
    - pattern: onedrive
      match: substring
  host:
    status: reviewed
    provenance:
      url: https://formulae.brew.sh/api/cask/onedrive.json
      evidence: Homebrew cask defines the OneDrive app bundle, updater launch agents/daemons, File Provider and Finder Sync containers, and OneDrive-specific support paths.
      checked_at: '2026-03-21'
    paths:
    - /Applications/OneDrive.app
    - ~/Library/Application Support/OneDrive
    - ~/Library/Application Support/com.microsoft.OneDrive
    - ~/Library/Application Support/FileProvider/com.microsoft.OneDrive.FileProvider
    - ~/Library/Caches/com.microsoft.OneDrive
    - ~/Library/Containers/com.microsoft.OneDrive.FileProvider
    - ~/Library/Containers/com.microsoft.OneDrive.FinderSync
    - ~/Library/Preferences/com.microsoft.OneDrive.plist
    - /Library/LaunchAgents/com.microsoft.OneDriveStandaloneUpdater.plist
    - /Library/LaunchDaemons/com.microsoft.OneDriveUpdaterDaemon.plist
    - /Library/LaunchDaemons/com.microsoft.OneDriveStandaloneUpdaterDaemon.plist
    bundle_ids:
    - com.microsoft.OneDrive
    - com.microsoft.OneDrive.FinderSync
    - com.microsoft.OneDrive.FileProvider
    process_names:
    - OneDrive
