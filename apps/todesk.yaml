      checked_at: '2026-03-21'
    hostname_patterns:
    - pattern: www.todesk.com
      match: exact
      role: app_brand
    - pattern: dl.todesk.com
      match: exact
      role: file_download
    keyword_patterns:
    - pattern: todesk
      match: substring
  host:
    status: reviewed
    provenance:
      url: https://docs.todesk.com/faq/60.html
      evidence: ToDesk’s official macOS permissions guide says the Screen Recording list contains ToDesk and ToDesk Desktop, and the same guide discusses opening ToDesk.pkg during installation; the reviewed host IOC therefore uses those Mac client process names.
      checked_at: '2026-03-21'
    process_names:
    - ToDesk
    - ToDesk Desktop
