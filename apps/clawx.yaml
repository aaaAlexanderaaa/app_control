id: clawx
name: ClawX
category: CLAW_FAMILY_APP
product_shape:
- macos
product_type:
- desktop_agent
- claw_gui_wrapper
severity: critical
priority_score: 93
notes: >-
  Desktop GUI wrapper for OpenClaw agents with scheduling and management from
  desktop. Manual re-review of the official site, linked China mirror, and
  Electron metadata confirms exact brand hosts plus ClawX-specific macOS app,
  bundle, and process artifacts. Excluded `github.com`, `api.github.com`, and
  raw GitHub asset hosts as network IOCs because they are shared code or
  release-distribution surfaces rather than ClawX-owned service domains.
references:
- url: https://claw-x.com
  kind: official_site
  summary: Official ClawX site establishes claw-x.com and its linked China mirror as first-party brand surfaces.
  checked_at: '2026-03-22'
- url: https://api.github.com/repos/ValueCell-ai/ClawX/releases/latest
  kind: github_release_api
  summary: GitHub release metadata explicitly lists the current ClawX arm64 and x64 macOS DMG asset names.
  checked_at: '2026-03-22'
- url: https://raw.githubusercontent.com/ValueCell-ai/ClawX/main/electron-builder.yml
  kind: upstream_source
  summary: Electron builder config sets appId to app.clawx.desktop and productName to ClawX.
  checked_at: '2026-03-23'
- url: https://raw.githubusercontent.com/ValueCell-ai/ClawX/main/resources/cli/posix/openclaw
  kind: upstream_source
  summary: ClawX launcher script invokes Contents/MacOS/ClawX inside the macOS application bundle.
  checked_at: '2026-03-23'
iocs:
  network:
    status: reviewed
    provenance:
      url: https://claw-x.com
      evidence: >-
        Official ClawX site and linked China mirror establish `claw-x.com`
        and `clawx.com.cn` as first-party ClawX brand domains.
      checked_at: '2026-03-22'
    hostname_patterns:
    - pattern: claw-x.com
      match: exact
      role: app_brand
    - pattern: clawx.com.cn
      match: exact
      role: app_brand
    keyword_patterns:
    - pattern: clawx
      match: substring
  host:
    status: reviewed
    provenance:
      url: https://raw.githubusercontent.com/ValueCell-ai/ClawX/main/electron-builder.yml
      evidence: >-
        ClawX's upstream Electron builder config sets `appId` to
        `app.clawx.desktop` and `productName` to `ClawX`, and the bundled
        launcher script invokes `Contents/MacOS/ClawX`, so the reviewed host
        IOC keeps only those ClawX-specific install and runtime artifacts.
      checked_at: '2026-03-23'
    paths:
    - /Applications/ClawX.app
    - ~/Applications/ClawX.app
    bundle_ids:
    - app.clawx.desktop
    process_names:
    - ClawX
