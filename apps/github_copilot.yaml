id: github_copilot
name: GitHub Copilot
category: GENAI_CODING
product_shape:
- macos
- web
product_type:
- coding
- assistant
severity: high
priority_score: 80
notes: High signal when copilot-specific hosts are present.
iocs:
  network:
    status: reviewed
    provenance:
      url: https://github.blog/changelog/2026-03-02-network-configuration-changes-for-copilot-coding-agent-now-in-effect/
      evidence: GitHub’s official Copilot changelog directs network allowlists to the Copilot-plan-specific API hosts api.business.githubcopilot.com, api.enterprise.githubcopilot.com, and api.individual.githubcopilot.com, and explicitly notes that api.githubcopilot.com can now be removed for the coding agent.
      checked_at: '2026-03-21'
    hostname_patterns:
    - pattern: api.business.githubcopilot.com
      match: exact
      role: app_brand
    - pattern: api.enterprise.githubcopilot.com
      match: exact
      role: app_brand
    - pattern: api.individual.githubcopilot.com
      match: exact
      role: app_brand
    keyword_patterns:
    - pattern: copilot
      match: substring
    - pattern: githubcopilot
      match: substring
  host:
    status: reviewed
    provenance:
      url: https://marketplace.visualstudio.com/items?itemName=GitHub.copilot
      evidence: The official VS Code marketplace pages use the extension identifiers GitHub.copilot and GitHub.copilot-chat, and the VS Code documentation states that macOS extensions are installed under ~/.vscode/extensions.
      checked_at: '2026-03-21'
    paths:
    - ~/.vscode/extensions/github.copilot*
