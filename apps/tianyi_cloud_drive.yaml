      checked_at: '2026-03-21'
    hostname_patterns:
    - pattern: cloud.189.cn
      match: exact
      role: app_brand
    - pattern: download.cloud.189.cn
      match: exact
      role: file_download
    keyword_patterns:
    - pattern: cloud189
      match: substring
    - pattern: 天翼云盘
      match: substring
  host:
    status: reviewed
    provenance:
      url: https://formulae.brew.sh/api/cask/cloud189.json
      evidence: The Homebrew cask installs 天翼云盘.app and zaps the Tianyi Cloud Drive-specific Application Support and preference paths on macOS; retained host IOC is limited to those cask-backed artifacts and the app process name.
      checked_at: '2026-03-21'
    paths:
    - /Applications/天翼云盘.app
    - ~/Library/Application Support/com.21cn.cloud-dist
    - ~/Library/Preferences/21cn.cloud.dist.plist
    process_names:
    - 天翼云盘
