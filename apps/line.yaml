      checked_at: '2026-03-21'
    hostname_patterns:
    - pattern: line.me
      match: suffix
      role: app_brand
    keyword_patterns:
    - pattern: line messenger
      match: substring
    - pattern: line mac
      match: substring
  host:
    status: reviewed
    provenance:
      url: https://apps.apple.com/us/app/line/id539883307?mt=12
      evidence: Apple’s official macOS App Store listing identifies LINE as available on Mac with the app name LINE; retained host IOC is limited to the standard LINE app bundle name.
      checked_at: '2026-03-21'
    paths:
    - /Applications/LINE.app
    process_names:
    - LINE
