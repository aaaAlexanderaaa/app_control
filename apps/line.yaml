id: line
name: LINE
category: NON_WORK_IM
product_shape:
- macos
- web
product_type:
- im
severity: medium
priority_score: 73
notes: Prefer LINE-owned domains and the exact Mac App Store app name; avoid generic line-only matching.
iocs:
