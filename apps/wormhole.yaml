        to that exact first-party host.
      checked_at: '2026-03-22'
    hostname_patterns:
    - pattern: wormhole.app
      match: exact
      role: app_brand
    keyword_patterns:
    - pattern: wormhole.app
      match: substring
  host:
    status: reviewed
    provenance:
      url: https://formulae.brew.sh/api/cask/wormhole.json
      evidence: >-
        The Homebrew Wormhole cask explicitly installs `Wormhole.app` and zaps
        `~/Library/Saved Application State/er.Wormhole.savedState`, so the
        reviewed host IOC keeps only those explicit artifacts.
      checked_at: '2026-03-22'
    paths:
    - /Applications/Wormhole.app
    - ~/Library/Saved Application State/er.Wormhole.savedState
