id: openclaw
name: OpenClaw
category: CLAW_FAMILY_APP
product_shape:
- macos
product_type:
- personal_agent
- desktop_agent
- automation
severity: critical
priority_score: 96
notes: >-
  OpenClaw is the reference claw-family personal agent with ClawHub skills,
  remote messaging control, and local automation. Independent manual review
  (2026-03-29) verified all four first-party domains via web fetch and crt.sh:
  `openclaw.ai` (live, subdomains: docs, trust, www), `clawhub.ai` (live,
  wildcard cert, subdomains: auth, manatee, www), `clawhub.com` (live,
  wildcard cert, redirects to clawhub.ai). Changed hostname matches from
  exact to suffix because crt.sh confirms active subdomains and wildcard
  certs on all three brand domains; removed redundant `docs.openclaw.ai`
  entry (covered by suffix on `openclaw.ai`). Added LaunchAgent plist paths
  (ai.openclaw.gateway, ai.openclaw.node) confirmed in src/daemon/constants.ts,
  and ~/Library/Application Support/OpenClaw from Homebrew cask zap. Kept
  bundle ID coverage to the actual app bundle identifier `ai.openclaw.mac`
  and excluded zap-only artifacts such as `bot.molt.mac` that are not
  CFBundleIdentifier values. Removed `~/.cargo/bin/openclaw` because
  OpenClaw is Node.js/TypeScript, not Rust. Excluded `github.com`,
  `raw.githubusercontent.com`, and model-provider endpoints because they are
  shared code-hosting or downstream AI infrastructure rather than
  OpenClaw-owned service domains.
references:
- url: https://docs.openclaw.ai/tools/clawhub
  kind: official_docs
  summary: Official OpenClaw docs publish the ClawHub tools surface on docs.openclaw.ai.
  checked_at: '2026-03-29'
- url: https://github.com/openclaw/openclaw
  kind: official_repo
  summary: Official OpenClaw repository (340k stars) documents macOS app, CLI install paths, LaunchAgent daemon labels, and local ~/.openclaw state.
  checked_at: '2026-03-29'
- url: https://formulae.brew.sh/cask/openclaw
  kind: homebrew_cask
  summary: Homebrew cask openclaw (formerly clawdbot) confirms /Applications/OpenClaw.app and Application Support paths; zap entries include legacy bot.molt.mac storage/preferences artifacts, not an app bundle ID.
  checked_at: '2026-03-29'
iocs:
  network:
    status: reviewed
    provenance:
      url: https://docs.openclaw.ai/tools/clawhub
      evidence: >-
        crt.sh CT log lookup confirms active subdomains and wildcard certs on
        openclaw.ai (docs, trust, www), clawhub.ai (auth, manatee, www +
        wildcard), and clawhub.com (www + wildcard). Suffix matching is
        appropriate for all three brand-owned apex domains.
      checked_at: '2026-03-29'
    hostname_patterns:
    - pattern: openclaw.ai
      match: suffix
      role: app_brand
    - pattern: clawhub.ai
      match: suffix
      role: app_brand
    - pattern: clawhub.com
      match: suffix
      role: app_brand
    keyword_patterns:
    - pattern: clawhub
      match: substring
    - pattern: openclaw
      match: substring
  host:
    status: reviewed
    provenance:
      url: https://github.com/openclaw/openclaw
      evidence: >-
        Homebrew cask and official repo confirm /Applications/OpenClaw.app,
        CLI paths, ~/.openclaw state, LaunchAgent plists for gateway and
        node daemons, and ~/Library/Application Support/OpenClaw data.
        Homebrew cask zap also references bot.molt.mac storage/preferences
        artifacts, but those are not CFBundleIdentifier values.
      checked_at: '2026-03-29'
    paths:
    - /Applications/OpenClaw.app
    - /opt/homebrew/bin/openclaw
    - /usr/local/bin/openclaw
    - ~/.local/bin/openclaw
    - ~/.openclaw
    - ~/Applications/OpenClaw.app
    - ~/Library/Application Support/OpenClaw
    - ~/Library/LaunchAgents/ai.openclaw.gateway.plist
    - ~/Library/LaunchAgents/ai.openclaw.node.plist
    - ~/Library/Logs/OpenClaw/diagnostics.jsonl
    bundle_ids:
    - ai.openclaw.mac
    process_names:
    - openclaw
