- url: https://raw.githubusercontent.com/Homebrew/homebrew-cask/master/Casks/q/qianwen.rb
  kind: homebrew_cask_formula
  summary: Raw cask confirms the Qwen desktop DMG URL pattern on qianwen-portal-cdn.tongyi.com and the installed app name Qianwen.app.
  checked_at: '2026-03-22'
- url: https://www.qianwen.com/qianwen
  kind: official_site
  summary: Official Qwen product site anchors the consumer app on the qianwen.com brand domain.
