iocs:
  network:
    status: reviewed
    provenance:
      url: https://raw.githubusercontent.com/Homebrew/homebrew-cask/master/Casks/q/qianwen.rb
      evidence: The official Homebrew cask sets Qwen's homepage to https://www.qianwen.com/qianwen and downloads the macOS client from https://qianwen-portal-cdn.tongyi.com/native/app/...; the reviewed network IOC set keeps only those exact product and download hosts.
      checked_at: '2026-03-22'
    hostname_patterns:
    - pattern: www.qianwen.com
      match: exact
      role: app_brand
    - pattern: qianwen-portal-cdn.tongyi.com
      match: exact
      role: file_download
    keyword_patterns:
    - pattern: qwen
      match: substring
    - pattern: qianwen
      match: substring
    - pattern: 千问
      match: substring
  host:
    status: reviewed
    provenance:
      url: https://formulae.brew.sh/api/cask/qianwen.json
      evidence: The Homebrew cask installs Qianwen.app and zaps Qwen-specific Application Support, logs, and preferences rooted at com.alibaba.tongyi on macOS, giving reliable host IOCs without guessing extra paths.
      checked_at: '2026-03-22'
    paths:
    - /Applications/Qianwen.app
    - ~/Library/Application Support/Qianwen
    - ~/Library/Logs/Qianwen
    - ~/Library/Preferences/com.alibaba.tongyi.plist
    process_names:
    - Qianwen
