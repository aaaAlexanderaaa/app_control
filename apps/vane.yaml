    status: reviewed
    provenance:
      url: https://vane.ai/
      evidence: The official Vane site is served from vane.ai, so the reviewed network IOC keeps only the exact Vane-owned hostname.
      checked_at: '2026-03-22'
    hostname_patterns:
    - pattern: vane.ai
      match: exact
      role: app_brand
    keyword_patterns:
    - pattern: vane.ai
      match: substring
  host:
    status: reviewed
    provenance:
      url: https://raw.githubusercontent.com/ItzCrazyKns/Vane/master/README.md
