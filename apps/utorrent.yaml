- macos
product_type:
- torrent_client
- p2p_file_sharing
severity: high
priority_score: 81
notes: Current macOS distribution is uTorrent Web; combine these brand IOC with protocol telemetry for torrent activity.
iocs:
  network:
    status: reviewed
    provenance:
      url: https://help.utorrent.com/en/support/solutions/articles/29000040342-installing-utorrent-web
