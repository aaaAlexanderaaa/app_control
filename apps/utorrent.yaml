      checked_at: '2026-03-21'
    hostname_patterns:
    - pattern: www.utorrent.com
      match: exact
      role: app_brand
    keyword_patterns:
    - pattern: utorrent web
      match: substring
  host:
    status: reviewed
    provenance:
      url: https://help.utorrent.com/en/support/solutions/articles/29000034450--will-damage-your-computer-you-should-move-it-to-the-trash-
      evidence: The official uTorrent Web Mac remediation article instructs users to delete ~/Library/Application Support/uTorrent Web/ and remove uTorrent Web from Applications before reinstalling, providing stable host-side artifacts for the macOS client.
      checked_at: '2026-03-21'
    paths:
    - /Applications/uTorrent Web.app
    - ~/Library/Application Support/uTorrent Web
