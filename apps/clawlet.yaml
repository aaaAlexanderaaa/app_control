notes: >-
  Local-first agent framework; reviewed IOC keeps the repo-published
  `clawlet.dev` docs host and the explicit `~/.clawlet` workspace artifacts
  documented by upstream onboarding and deployment guides. Excluded
  `github.com`, `raw.githubusercontent.com`, and generic model-provider
  endpoints because they are shared code-hosting or downstream infrastructure.
references:
- url: https://raw.githubusercontent.com/Kxrbx/Clawlet/main/README.md
  kind: upstream_readme
  summary: Upstream README documents clawlet init/onboard and the default ~/.clawlet workspace.
  checked_at: '2026-03-22'
- url: https://raw.githubusercontent.com/Kxrbx/Clawlet/main/DEPLOYMENT.md
  kind: upstream_docs
  summary: Deployment guide enumerates the default ~/.clawlet config, memory, heartbeat, and runtime files.
  checked_at: '2026-03-22'
- url: https://raw.githubusercontent.com/Kxrbx/Clawlet/main/docs/schemas/runtime-events.schema.json
  kind: upstream_source
  summary: Repo-published schema IDs are hosted on clawlet.dev, establishing a dedicated Clawlet docs host.
  checked_at: '2026-03-22'
- url: https://raw.githubusercontent.com/Kxrbx/Clawlet/main/pyproject.toml
  kind: upstream_source
  summary: Project metadata defines the `clawlet` CLI entrypoint.
  checked_at: '2026-03-22'
iocs:
