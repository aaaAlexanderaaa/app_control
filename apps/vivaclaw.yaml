notes: >-
  VivaClaw is a no-code SaaS for deploying OpenClaw to the user's private
  server from the exact `vivaclaw.com` brand domain. Manual re-review of the
  official site confirms private-server deployment, Telegram / Discord access,
  and BYOK model support. Excluded Hetzner, Telegram, Discord, and model
  provider endpoints because they are shared or downstream infrastructure, and
  omitted host IOC because the resulting runtime belongs to the user's server
  or underlying OpenClaw install rather than a VivaClaw-owned local bundle or
  stable filesystem path.
references:
- url: https://vivaclaw.com/
  kind: official_site
  summary: Official VivaClaw site markets no-code OpenClaw deployment to a private server with Telegram / Discord access and BYOK model support.
